name: Keepalive

# GitHub desactiva los crons de un repo tras 60 días sin actividad.
# Este job hace un commit vacío el día 1 de cada mes para que eso nunca pase.
on:
  schedule:
    - cron: "23 12 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "keepalive-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: mantener el cron activo"
          git push
