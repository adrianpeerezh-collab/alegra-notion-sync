name: Sync Alegra → Notion

on:
  schedule:
    # Cada 10 minutos (GitHub puede agregar unos minutos de jitter en horas pico)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sincronizar cotizaciones
        env:
          ALEGRA_EMAIL: ${{ secrets.ALEGRA_EMAIL }}
          ALEGRA_TOKEN: ${{ secrets.ALEGRA_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          P1_THRESHOLD: ${{ secrets.P1_THRESHOLD }}
        run: node sync.mjs
      - name: Publicar datos del dashboard
        run: |
          git config user.name "sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          if ! git diff --cached --quiet; then
            git commit -m "datos: actualizar dashboard"
            git pull --rebase origin main
            git push
          fi
